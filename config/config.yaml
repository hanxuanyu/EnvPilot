# EnvPilot 系统配置文件
# 说明：修改此文件后需重启应用生效

app:
  # 应用名称
  name: "EnvPilot"
  # 运行版本
  version: "0.1.0"
  # 数据存储目录（相对于可执行文件目录，或绝对路径）
  data_dir: "./data"
  # 日志目录
  log_dir: "./logs"

log:
  # 日志级别：debug / info / warn / error
  level: "info"
  # 日志文件路径（相对于 log_dir）
  filename: "envpilot.log"
  # 单文件最大 MB
  max_size: 100
  # 保留最近 N 个历史文件
  max_backups: 7
  # 历史文件保留天数
  max_age: 30
  # 是否压缩历史文件
  compress: true

database:
  # SQLite 数据库文件名（存放于 data_dir 下）
  filename: "envpilot.db"
  # 连接池最大空闲连接数
  max_idle_conns: 2
  # 连接池最大打开连接数
  max_open_conns: 10

security:
  # 是否启用主密码保护（false = 使用系统内置密钥）
  master_password_enabled: false
  # salt 存储文件名（存放于 data_dir 下）
  salt_file: ".salt"
  # 高风险命令正则列表（需要二次确认）
  dangerous_commands:
    - "rm -rf"
    - "DROP"
    - "DELETE"
    - "TRUNCATE"
    - "FORMAT"

dns:
  # 是否启用内置 DNS 服务
  enabled: false
  # DNS 监听地址
  listen_addr: "127.0.0.1:5353"
  # 上游 DNS 服务器（未命中本地记录时转发）
  upstream: "8.8.8.8:53"
  # 默认 TTL（秒）
  default_ttl: 300

health:
  # 健康检查默认间隔（秒）
  check_interval: 60
  # 超时时间（秒）
  timeout: 10
  # 是否启用自动检查
  auto_check: true
